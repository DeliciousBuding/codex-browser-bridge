name: Feature request
description: Suggest a new tool, capability, or improvement.
labels: [enhancement]
body:
  - type: textarea
    id: problem
    attributes:
      label: What problem are you trying to solve?
      description: Describe the use case, not the solution. What are you trying to do that the bridge can't do today?
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: If you have a specific tool or API in mind, describe it here. Optional.
    validations:
      required: false

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
    validations:
      required: false

  - type: checkboxes
    id: scope
    attributes:
      label: Scope check
      description: Pick whichever apply.
      options:
        - label: This needs new MCP tools
        - label: This needs new client/CDP methods
        - label: This is a non-Windows port (Mac/Linux)
        - label: This is a docs/example improvement
