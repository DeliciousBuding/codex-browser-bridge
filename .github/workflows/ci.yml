name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.head_ref || github.run_id }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  rust:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@1.85.0
        with:
          targets: x86_64-pc-windows-msvc,aarch64-pc-windows-msvc
          components: clippy
      - name: Check
        shell: bash
        run: cargo check --locked
      - name: Clippy
        shell: bash
        run: cargo clippy --locked -- -D warnings
      - name: Test
        shell: bash
        run: cargo test --locked
      - name: Test live E2E timeout cleanup
        shell: pwsh
        run: ./scripts/test-live-e2e-timeout.ps1
      - name: Install cargo-llvm-cov
        # Prebuilt binary via taiki-e — avoids `cargo install` compiling the
        # latest cargo-llvm-cov (0.8.7+ needs rustc 1.87, but our MSRV is 1.85).
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-llvm-cov
      - name: Coverage
        shell: bash
        run: |
          rustup component add llvm-tools-preview
          cargo llvm-cov --locked --lcov --output-path lcov.info
      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v7
        with:
          files: lcov.info
          fail_ci_if_error: false
        continue-on-error: true
      - name: Build x64
        shell: bash
        run: cargo build --locked --release --target x86_64-pc-windows-msvc
      - name: Build arm64
        shell: bash
        run: cargo build --locked --release --target aarch64-pc-windows-msvc

  npm:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: "22"
      - name: Test npm installer helpers
        shell: bash
        run: |
          cd npm
          npm test
      - name: Check npm package contents
        shell: bash
        run: |
          cd npm
          npm run check:package

  test-lib:
    # The reconnect tests in client.rs use tokio duplex mocks under
    # cfg(not(windows)) — run them on Linux where PipeStream = DuplexStream.
    # The shipped binary stays Windows-only; this job only exercises
    # platform-agnostic logic (reconnect state machine, frame round-trip).
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@1.85.0
        with:
          components: clippy
      - name: Test non-Windows harness
        shell: bash
        run: cargo test --locked
      - name: Clippy non-Windows harness
        shell: bash
        run: cargo clippy --locked --all-targets -- -D warnings
