name: Release

on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag, for example v1.5.1"
        required: true

permissions:
  contents: write

jobs:
  test:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
      - uses: actions/setup-node@v6
        with:
          node-version: "22"
      - name: Vet
        shell: bash
        run: go vet ./...
      - name: Test with coverage
        shell: bash
        run: go test -race -coverprofile=coverage.out -covermode=atomic ./...
      - name: Build
        shell: bash
        run: go build -trimpath -ldflags "-s -w" -o bin/codex-browser-bridge.exe ./cmd/bridge
      - name: Test npm installer helpers
        shell: bash
        run: |
          cd npm
          npm test
      - name: Check npm package contents
        shell: bash
        run: |
          cd npm
          npm pack --dry-run --json > pack.json
          node - <<'NODE'
          const fs = require("fs");
          const pack = JSON.parse(fs.readFileSync("pack.json", "utf8"))[0];
          const files = new Set(pack.files.map((f) => f.path));
          for (const required of ["package.json", "scripts/install.js", "bin/codex-browser-bridge.js"]) {
            if (!files.has(required)) {
              throw new Error(`npm package is missing ${required}`);
            }
          }
          NODE

  lint:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
      - uses: golangci/golangci-lint-action@v9
        with:
          version: latest

  release:
    needs: [test, lint]
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Get version
        id: version
        shell: bash
        run: |
          TAG="${{ github.event.inputs.tag || github.ref_name }}"
          if [[ ! "$TAG" =~ ^v[0-9]+(\.[0-9]+){1,2}([-+][0-9A-Za-z.-]+)?$ ]]; then
            echo "Invalid release tag: $TAG" >&2
            exit 1
          fi
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

      - name: Build
        shell: bash
        run: |
          VERSION="${{ steps.version.outputs.tag }}"
          GOOS=windows GOARCH=amd64 go build -trimpath \
            -ldflags "-s -w -X main.version=$VERSION" \
            -o "codex-browser-bridge.exe" ./cmd/bridge
          GOOS=windows GOARCH=arm64 go build -trimpath \
            -ldflags "-s -w -X main.version=$VERSION" \
            -o "codex-browser-bridge-arm64.exe" ./cmd/bridge

      - name: Generate checksums
        shell: bash
        run: sha256sum codex-browser-bridge*.exe > checksums.txt

      - name: Generate release notes
        shell: bash
        run: |
          if [ -f CHANGELOG.md ]; then
            awk '/^## \[/{if(found) exit; found=1; next} found{print}' CHANGELOG.md > release_notes.txt
          fi
          if [ ! -s release_notes.txt ]; then
            prev=$(git describe --tags --abbrev=0 HEAD~1 2>/dev/null || git rev-list --max-parents=0 HEAD)
            git log --oneline --no-merges "$prev"..HEAD > release_notes.txt
          fi

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          gh release create "${{ steps.version.outputs.tag }}" \
            --title "${{ steps.version.outputs.tag }}" \
            --notes-file release_notes.txt \
            codex-browser-bridge.exe \
            codex-browser-bridge-arm64.exe \
            checksums.txt
