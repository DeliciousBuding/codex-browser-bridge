name: Supply Chain

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # Weekly Monday ~04:37 UTC — off-round minute to spread load across the fleet.
    - cron: "37 4 * * 1"

# A daily cap so a runaway schedule loop can't burn CI minutes.
concurrency:
  group: supply-chain-${{ github.ref }}
  cancel-in-progress: false

jobs:
  cargo-deny:
    name: cargo-deny (advisories · licenses · bans · sources)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      # `cargo deny check` runs all four checks against deny.toml. Its advisories
      # check queries the same RustSec advisory-db as cargo-audit, so it is a
      # strict superset — no separate cargo-audit job is needed.
      - uses: EmbarkStudios/cargo-deny-action@v2
        with:
          command: check
