version: "2"

run:
  tests: true

linters:
  default: none
  enable:
    - errcheck
    - govet
    - ineffassign
    - staticcheck
    - unused
    - misspell
    - unconvert
    - revive
  settings:
    errcheck:
      check-type-assertions: false
      exclude-functions:
        - encoding/json.Unmarshal
        - encoding/json.Marshal
        - (*encoding/json.Encoder).Encode
        - fmt.Fprintln
        - fmt.Fprintf
        - fmt.Println
        - fmt.Printf
    revive:
      rules:
        - name: blank-imports
        - name: context-as-argument
        - name: error-return
        - name: error-strings
        - name: error-naming
        - name: exported
          arguments: ["disableStutteringCheck"]
        - name: increment-decrement
        - name: var-declaration
        - name: range
        - name: receiver-naming
        - name: time-naming
        - name: unexported-return
        - name: indent-error-flow
        - name: errorf
        - name: empty-block
        - name: superfluous-else
        - name: unused-parameter
  exclusions:
    rules:
      - path: _test\.go
        linters:
          - errcheck
          - revive
          - unused

formatters:
  enable:
    - gofmt
    - goimports

issues:
  max-issues-per-linter: 0
  max-same-issues: 0
